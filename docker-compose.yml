version: '3.8'

services:
  postgres:
    image: pgvector/pgvector:pg15
    container_name: pgro-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: pgr_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - pgro-network

  redis:
    image: redis:7-alpine
    container_name: pgro-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - pgro-network

  api-gateway:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: development
    image: pgro-api-gateway:latest
    container_name: pgro-api-gateway
    volumes:
      - ./backend/services/api-gateway/app:/app/app:ro
      - ./backend/shared:/app/backend/shared:ro
    ports:
      - "8000:8000"
    env_file:
      - ./backend/services/api-gateway/.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    networks:
      - pgro-network

  staff-service:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: development
    image: pgro-staff-service:latest
    container_name: pgro-staff-service
    volumes:
      - ./backend/services/staff-service/app:/app/app:ro
      - ./backend/shared:/app/backend/shared:ro
    ports:
      - "8001:8001"
    env_file:
      - ./backend/services/staff-service/.env
    depends_on:
      postgres:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8001 --reload
    networks:
      - pgro-network

  applicant-service:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: development
    image: pgro-applicant-service:latest
    container_name: pgro-applicant-service
    volumes:
      - ./backend/services/applicant-service/app:/app/app:ro
      - ./backend/shared:/app/backend/shared:ro
    ports:
      - "8002:8002"
    env_file:
      - ./backend/services/applicant-service/.env
    depends_on:
      postgres:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8002 --reload
    networks:
      - pgro-network

  matching-service:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: development
    image: pgro-matching-service:latest
    container_name: pgro-matching-service
    volumes:
      - ./backend/services/matching-service/app:/app/app:ro
      - ./backend/shared:/app/backend/shared:ro
    ports:
      - "8003:8003"
    env_file:
      - ./backend/services/matching-service/.env
    depends_on:
      postgres:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8003 --reload
    networks:
      - pgro-network

  file-service:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: development
    image: pgro-file-service:latest
    container_name: pgro-file-service
    volumes:
      - ./backend/services/file-service/app:/app/app:ro
      - ./backend/shared:/app/backend/shared:ro
      - ./backend/storage:/app/storage
    ports:
      - "8004:8004"
    env_file:
      - ./backend/services/file-service/.env
    depends_on:
      postgres:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8004 --reload
    networks:
      - pgro-network

  auth-service:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: development
    image: pgro-auth-service:latest
    container_name: pgro-auth-service
    volumes:
      - ./backend/services/auth-service/app:/app/app:ro
      - ./backend/shared:/app/backend/shared:ro
    ports:
      - "8005:8005"
    env_file:
      - ./backend/services/auth-service/.env
    depends_on:
      postgres:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8005 --reload
    networks:
      - pgro-network

  email-service:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: development
    image: pgro-email-service:latest
    container_name: pgro-email-service
    volumes:
      - ./backend/services/email-service/app:/app/app:ro
      - ./backend/shared:/app/backend/shared:ro
    ports:
      - "8006:8006"
    env_file:
      - ./backend/services/email-service/.env
    depends_on:
      redis:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8006 --reload
    networks:
      - pgro-network
  
  frontend:
    image: node:20-alpine
    container_name: pgro-frontend
    working_dir: /app
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    depends_on:
      - api-gateway
    networks:
      - pgro-network

volumes:
  postgres_data:
  redis_data:

networks:
  pgro-network:
    driver: bridge

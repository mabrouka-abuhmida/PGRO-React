name: pgr-matching

channels:
  - conda-forge
  - pytorch
  - nvidia
  - defaults

dependencies:
  - python=3.11
  - pip
  # CUDA and GPU support
  - cudatoolkit=11.8
  - cudnn=8.9
  - pytorch::pytorch=2.1.0
  - pytorch::torchvision
  - pytorch::torchaudio
  - pytorch-cuda=11.8
  # Image processing (required for EasyOCR and PDF processing)
  - pillow>=10.1.0
  # Core Python packages
  - pip:
    # FastAPI and web framework
    - fastapi==0.104.1
    - uvicorn[standard]==0.24.0
    - python-multipart==0.0.6
    - pydantic==2.5.0
    - pydantic-settings==2.1.0
    # Database
    - sqlalchemy==2.0.23
    - alembic==1.12.1
    - psycopg2-binary==2.9.9
    - asyncpg==0.29.0
    # Vector database support (pgvector)
    - pgvector==0.2.3
    # LLM and embeddings
    - openai==1.3.5
    - tiktoken==0.5.1
    # File processing
    - pymupdf>=1.23.0
    - easyocr>=1.7.0
    - python-docx==1.1.0
    # Email service
    - sendgrid>=6.10.0
    # Utilities
    - python-dotenv==1.0.0
    - httpx==0.25.1
    - aiofiles==23.2.1
    - numpy==1.26.2
    - pandas==2.1.3
    # Caching
    - redis==5.0.1
    # Development tools
    - pytest==7.4.3
    - pytest-asyncio==0.21.1
    - black==23.11.0
    - flake8==6.1.0
    - mypy==1.7.0

